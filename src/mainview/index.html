<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link rel="stylesheet" href="xterm.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">PROJECTS</span>
          <button id="add-project-btn" title="Add project">+</button>
        </div>
        <div id="project-list"></div>
        <div class="sidebar-footer">
          <button id="settings-btn" class="settings-label">
            &#x2699; Settings
          </button>
        </div>
      </aside>
      <div id="main-content">
        <div id="toolbar" style="display: none">
          <div class="toolbar-group">
            <button
              class="toolbar-btn"
              id="btn-open-vscode"
              title="Open in VS Code"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M16 3l5 2.5v13L16 21l-11-5.5L16 3z" />
                <path d="M5 15.5L2 17V7l3 1.5" />
                <path d="M16 3L5 9.5v6L16 21" />
              </svg>
              VS Code
            </button>
            <button
              class="toolbar-btn"
              id="btn-open-finder"
              title="Reveal in Finder"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"
                />
              </svg>
              Finder
            </button>
          </div>
          <div class="toolbar-group">
            <button class="toolbar-btn" id="btn-git-status" title="Git status">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="18" cy="18" r="3" />
                <circle cx="6" cy="6" r="3" />
                <path d="M6 21V9a9 9 0 009 9" />
              </svg>
              Status
            </button>
            <button class="toolbar-btn" id="btn-git-pull" title="Git pull">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 5v14M5 12l7 7 7-7" />
              </svg>
              Pull
            </button>
            <button class="toolbar-btn" id="btn-git-commit" title="Git commit">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="4" />
                <path d="M1.05 12H7m10 0h5.95" />
              </svg>
              Commit
            </button>
            <button
              class="toolbar-btn"
              id="btn-git-reset"
              title="Switch to main/develop and pull"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"
                />
              </svg>
              Reset
            </button>
          </div>
        </div>
        <div id="terminal-area">
          <div id="empty-state">
            <p>Click <strong>+</strong> to open a project folder</p>
          </div>
        </div>
      </div>
    </div>
    <div id="settings-panel" class="settings-panel">
      <div class="settings-header">
        <button id="settings-back" class="settings-back-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
        </button>
        <span class="settings-title">Settings</span>
      </div>
      <div class="settings-body">
        <div class="settings-hero">
          <div class="settings-app-icon">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
              />
            </svg>
          </div>
          <div class="settings-app-name">Chat</div>
          <div class="settings-app-version" id="settings-version">-</div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Session</div>
          <div class="settings-row">
            <span class="settings-row-label">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"
                />
              </svg>
              Open projects
            </span>
            <span class="settings-row-badge" id="settings-project-count"
              >0</span
            >
          </div>
          <div class="settings-row">
            <span class="settings-row-label">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
              </svg>
              Runtime
            </span>
            <span class="settings-row-value">Electrobun</span>
          </div>
          <div class="settings-row settings-row-last">
            <span class="settings-row-label">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
              Config
            </span>
            <span class="settings-row-value settings-row-mono"
              >~/.config/chat-app/</span
            >
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Preferences</div>
          <div class="settings-row settings-row-last">
            <span class="settings-row-label">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M6 3v12" />
                <circle cx="18" cy="6" r="3" />
                <circle cx="6" cy="18" r="3" />
                <path d="M18 9a9 9 0 01-9 9" />
              </svg>
              Use worktree
            </span>
            <label class="settings-toggle">
              <input type="checkbox" id="settings-worktree" />
              <span class="settings-toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-section-title">Actions</div>
          <button class="settings-action-btn" id="settings-close-all">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6L6 18" />
              <path d="M6 6l12 12" />
            </svg>
            Close all projects
          </button>
          <button
            class="settings-action-btn settings-action-danger"
            id="settings-clear-data"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6" />
              <path
                d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
              />
            </svg>
            Clear saved data
          </button>
        </div>

        <div class="settings-footer">Built with Electrobun + xterm.js</div>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
