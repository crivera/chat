name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  determine-channel:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      tag: ${{ steps.channel.outputs.tag }}
    steps:
      - name: Determine release channel
        id: channel
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *"-canary"* ]]; then
            echo "channel=canary" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: determine-channel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync package.json version from tag
        run: |
          VERSION="${{ needs.determine-channel.outputs.tag }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Codesign bun-pty native libraries
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
        run: |
          find node_modules/bun-pty -name "*.dylib" -exec \
            codesign --force --timestamp --sign "$ELECTROBUN_DEVELOPER_ID" --options runtime {} \;

      - name: Build
        run: bun run build:${{ needs.determine-channel.outputs.channel }}
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: artifacts/*

  build-windows:
    needs: determine-channel
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync package.json version from tag
        shell: bash
        run: |
          VERSION="${{ needs.determine-channel.outputs.tag }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build
        run: bun run build:${{ needs.determine-channel.outputs.channel }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: artifacts/*

  release:
    needs: [determine-channel, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-artifacts
          path: artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-artifacts
          path: artifacts

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-channel.outputs.tag }}
          prerelease: ${{ needs.determine-channel.outputs.channel == 'canary' }}
          generate_release_notes: true
          files: |
            artifacts/*
